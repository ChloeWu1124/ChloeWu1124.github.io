<!DOCTYPE html>
<html lang="zh-Hant-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chloe Wu | 工作照</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css">
    <style>
      .hero-bg {
        background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
      }
      .photo-item {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        cursor: pointer;
        transition: transform 0.3s ease;
      }
      .photo-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
        color: white;
        padding: 20px 15px 15px;
        font-size: 14px;
        font-weight: 500;
      }
      .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
      }
      .photo-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      }
      .photo-item:hover img {
        transform: scale(1.05);
      }
      /* 不同尺寸的照片 */
      .photo-large {
        height: 400px;
      }
      .photo-medium {
        height: 280px;
      }
      .photo-tall {
        height: 400px;
      }
      
      /* Modal 樣式 */
      .modal-content {
        background: transparent;
        border: none;
      }
      .modal-body {
        padding: 0;
        text-align: center;
      }
      .modal-body img {
        max-width: 100%;
        max-height: 80vh;
        object-fit: contain;
        border-radius: 8px;
      }
      .modal-caption {
        color: white;
        background: rgba(0, 0, 0, 0.7);
        padding: 15px;
        margin-top: 10px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">Chloe Wu</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="./index.html">個人資訊</a></li>
            <li class="nav-item"><a class="nav-link" href="./portfolio.html">作品集</a></li>
            <li class="nav-item"><a class="nav-link active" href="./photos.html">工作照</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="hero-bg">
      <div class="container">
        <div class="py-5">
          <h1 class="display-4 fw-bold text-primary mb-3">工作照</h1>
          <p class="lead text-muted" style="font-weight: 400;">紀錄拍攝現場與日常工作花絮</p>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="py-5">
        <!-- 第一行：左側直向照片，右側橫向照片 -->
        <div class="row g-3 mb-4">
          <div class="col-lg-5">
            <div class="photo-item photo-tall" data-bs-toggle="modal" data-bs-target="#photoModal" data-photo="images/工作照/01上排左-協助收音.JPG" data-caption="收音作業：拍攝現場協助調整收音設備，確保音質清晰無雜訊">
              <img src="images/工作照/01上排左-協助收音.JPG" alt="協助收音" />
              <div class="photo-overlay">
                收音作業：拍攝現場協助調整收音設備，確保音質清晰無雜訊
              </div>
            </div>
          </div>
          <div class="col-lg-7">
            <div class="photo-item photo-large" data-bs-toggle="modal" data-bs-target="#photoModal" data-photo="images/工作照/02上排右-穩定器拍攝.JPG" data-caption="穩定器拍攝：熟悉穩定器操作進行動態拍攝">
              <img src="images/工作照/02上排右-穩定器拍攝.JPG" alt="穩定器拍攝" />
              <div class="photo-overlay">
                穩定器拍攝：熟悉穩定器操作進行動態拍攝
              </div>
            </div>
          </div>
        </div>

        <!-- 第二行：三張照片平均分配 -->
        <div class="row g-3">
          <div class="col-md-4">
            <div class="photo-item photo-medium" data-bs-toggle="modal" data-bs-target="#photoModal" data-photo="images/工作照/03下排左-收工照.JPG" data-caption="拍攝收工時刻：完成一天辛苦的拍攝工作，大合照！！！">
              <img src="images/工作照/03下排左-收工照.JPG" alt="收工照" />
              <div class="photo-overlay">
                拍攝收工時刻：完成一天辛苦的拍攝工作，大合照！！！
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="photo-item photo-medium" data-bs-toggle="modal" data-bs-target="#photoModal" data-photo="images/工作照/04下排中間-佈景+燈光架設.jpg" data-caption="佈景與燈光架設：仔細規劃場景佈置與燈光配置，打造理想視覺效果">
              <img src="images/工作照/04下排中間-佈景+燈光架設.jpg" alt="佈景+燈光架設" />
              <div class="photo-overlay">
                佈景與燈光架設：仔細規劃場景佈置與燈光配置，打造理想視覺效果
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="photo-item photo-medium" data-bs-toggle="modal" data-bs-target="#photoModal" data-photo="images/工作照/05下排右-訪談拍攝.jpg" data-caption="訪談拍攝：隨時掌握畫面，確保拍攝者完美呈現在鏡頭中">
              <img src="images/工作照/05下排右-訪談拍攝.jpg" alt="訪談拍攝" />
              <div class="photo-overlay">
                訪談拍攝：隨時掌握畫面，確保拍攝者完美呈現在鏡頭中
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- 照片彈出視窗 Modal -->
    <div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-body">
            <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="關閉" style="z-index: 1050;"></button>
            <img id="modalImage" src="" alt="工作照片" />
            <div id="modalCaption" class="modal-caption"></div>
          </div>
        </div>
      </div>
    </div>

    <footer class="border-top py-4 text-center text-muted">
        Copyright © <span id="y"></span> Chloe Wu
    </footer>

    <script>
      const y = document.getElementById('y');
      if (y) y.textContent = new Date().getFullYear();
      
      // 照片點擊功能
      const photoModal = document.getElementById('photoModal');
      const modalImage = document.getElementById('modalImage');
      const modalCaption = document.getElementById('modalCaption');
      
      photoModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const photoSrc = button.getAttribute('data-photo');
        const caption = button.getAttribute('data-caption');
        
        modalImage.src = photoSrc;
        modalCaption.textContent = caption;
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
